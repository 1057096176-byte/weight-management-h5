<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    var redirectUrl = window.location.origin + '/weight-management/?p=' + encodeURIComponent(path.replace('/weight-management', '') + search) + (hash ? '&h=' + encodeURIComponent(hash) : '');
    window.location.replace(redirectUrl);
  </script>
</head>
<body></body>
</html>
